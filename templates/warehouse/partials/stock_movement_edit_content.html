{% load djicons i18n %}
<div data-back-url="{% url 'warehouse:stock_movements_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Edit Stockmovement" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'warehouse:stock_movements_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="edit-stock_movement-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="edit-stock_movement-form"
          hx-post="{% url 'warehouse:stock_movement_edit' obj.id %}" class="max-w-2xl">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Reference" %}</label>
                <input type="text" name="reference" class="input input-sm w-full" value="{{ obj.reference }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Movement Type" %}</label>
                <select name="movement_type" class="select select-sm w-full">
                <option value="">---</option>
                </select>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Quantity" %}</label>
                <input type="number" name="quantity" class="input input-sm w-full" step="0.01" value="{{ obj.quantity }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Notes" %}</label>
                <textarea name="notes" class="textarea textarea-sm w-full" rows="3">{{ obj.notes }}</textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
                <input type="text" name="status" class="input input-sm w-full" value="{{ obj.status }}">
                </div>
            </div>
        </div>
    </form>
</div>
