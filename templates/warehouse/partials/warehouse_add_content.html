{% load djicons i18n %}
<div data-back-url="{% url 'warehouse:warehouses_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Add Warehouse" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'warehouse:warehouses_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="add-warehouse-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="add-warehouse-form"
          hx-post="{% url 'warehouse:warehouse_add' %}" class="max-w-2xl">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Name" %}</label>
                <input type="text" name="name" class="input input-sm w-full" placeholder="{% trans 'Name' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Code" %}</label>
                <input type="text" name="code" class="input input-sm w-full" placeholder="{% trans 'Code' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Address" %}</label>
                <textarea name="address" class="textarea textarea-sm w-full" rows="3"></textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Is Active" %}</label>
                <label class="toggle color-success">
                <input type="checkbox" name="is_active">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                </div>
            </div>
        </div>
    </form>
</div>
